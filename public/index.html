<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RepoRadar — find the repo, not the noise</title>
<meta name="description" content="Cross-platform repository discovery engine with smart composite ranking for GitHub, GitLab, and Codeberg. Built by Jojin John." />

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://reporadar-eight.vercel.app/" />
<meta property="og:title" content="RepoRadar — find the repo, not the noise" />
<meta property="og:description" content="Cross-platform repository discovery engine with smart composite ranking for GitHub, GitLab, and Codeberg. Built by Jojin John." />

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image" />
<meta property="twitter:url" content="https://reporadar-eight.vercel.app/" />
<meta property="twitter:title" content="RepoRadar — find the repo, not the noise" />
<meta property="twitter:description" content="Cross-platform repository discovery engine with smart composite ranking for GitHub, GitLab, and Codeberg. Built by Jojin John." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>

<header class="hero">
  <div class="radar-wrap" aria-hidden="true">
    <div class="radar-ring r1"></div>
    <div class="radar-ring r2"></div>
    <div class="radar-ring r3"></div>
    <div class="radar-sweep"></div>
    <div class="radar-blip b1"></div>
    <div class="radar-blip b2"></div>
    <div class="radar-blip b3"></div>
  </div>

  <div class="site-header-actions">
    <div id="theme-switcher" class="theme-switcher">
      <button class="theme-btn active" data-theme="amber" title="Amber Theme" aria-label="Amber Theme"></button>
      <button class="theme-btn" data-theme="green" title="Green Theme" aria-label="Green Theme"></button>
      <button class="theme-btn" data-theme="cyan" title="Cyan Theme" aria-label="Cyan Theme"></button>
      <button class="theme-btn" data-theme="purple" title="Purple Theme" aria-label="Purple Theme"></button>
    </div>
    <div class="site-header-buttons">
      <a href="https://github.com/jojin1709/reporadar" target="_blank" rel="noopener" class="util-btn link-btn" style="text-decoration: none; display: inline-flex; align-items: center; gap: 4px;">
        <svg height="12" width="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: middle;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        GITHUB
      </a>
      <button id="bookmarks-toggle-btn" class="util-btn">
        ★ BOOKMARKS (<span id="bookmarks-count">0</span>)
      </button>
    </div>
  </div>

  <div class="hero-content">
    <p class="eyebrow">GITHUB · GITLAB · CODEBERG · RADAR</p>
    <h1>Repo<span class="accent">Radar</span></h1>
    <p class="tagline">Describe what you need. Stop scrolling stars manually.</p>

    <form id="search-form" class="search-form" autocomplete="off">
      <input
        type="text"
        id="query"
        placeholder="e.g. react admin dashboard template, python ocr library..."
        aria-label="Search repositories"
      />
      <button type="submit" id="search-btn">
        <span class="btn-label">SCAN</span>
      </button>
      <button type="button" id="trending-btn" class="trending-btn" title="Show Trending Repositories">
        🔥 TRENDING
      </button>
    </form>

    <div id="history-container" class="history-container hidden">
      <span class="history-label">RECENT:</span>
      <div id="history-list" class="history-list"></div>
    </div>

    <button type="button" id="filters-toggle-btn" class="filters-toggle-btn">
      <span>ADVANCED FILTERS</span> <span class="arrow">▼</span>
    </button>

    <div id="filters-panel" class="filters-panel collapsed">
      <div class="filters">
        <label class="filter">
          <span>Source</span>
          <select id="f-source">
            <option value="all">GitHub + GitLab + Codeberg</option>
            <option value="github">GitHub only</option>
            <option value="gitlab">GitLab only</option>
            <option value="codeberg">Codeberg only</option>
          </select>
        </label>

        <label class="filter">
          <span>Language</span>
          <input type="text" id="f-language" placeholder="any" />
        </label>

        <label class="filter">
          <span>License</span>
          <input type="text" id="f-license" placeholder="e.g. mit" />
        </label>

        <label class="filter">
          <span>Min ★</span>
          <input type="number" id="f-minstars" placeholder="0" min="0" />
        </label>

        <label class="filter">
          <span>Sort</span>
          <select id="f-sort">
            <option value="best">Best match</option>
            <option value="stars">Most stars</option>
            <option value="updated">Recently updated</option>
          </select>
        </label>
      </div>
    </div>
  </div>
</header>

<main class="results-area">
  <div id="status-line" class="status-line"></div>
  <div id="results" class="results-grid" role="list"></div>
</main>

<div id="bookmarks-drawer" class="bookmarks-drawer">
  <div class="drawer-header">
    <h2>SAVED SIGNALS</h2>
    <button id="bookmarks-close-btn" class="close-btn" aria-label="Close Bookmarks">×</button>
  </div>
  <div class="drawer-actions">
    <button id="bookmarks-export-btn" class="drawer-action-btn">EXPORT MD</button>
    <button id="bookmarks-clear-btn" class="drawer-action-btn danger">CLEAR ALL</button>
  </div>
  <div id="bookmarks-list" class="bookmarks-list">
    <!-- Loaded dynamically -->
  </div>
</div>

<footer class="site-footer">
  <p>RepoRadar — self-hosted repo discovery. No tracking, no accounts, no noise.</p>
  <p style="margin-top: 8px;">Developed by <a href="https://www.linkedin.com/in/jojin-john-74386b34a/" target="_blank" rel="noopener" style="color: var(--amber); text-decoration: none;">Jojin John</a></p>
</footer>

<template id="card-template">
  <article class="repo-card" role="listitem">
    <div class="card-top">
      <span class="source-tag"></span>
      <div class="card-top-right">
        <span class="score-tag tooltip-trigger">
          score <span class="score-val"></span>
          <span class="tooltip-content">
            <!-- Filled dynamically -->
          </span>
        </span>
        <button class="bookmark-btn" title="Add to Bookmarks">★</button>
      </div>
    </div>
    <h3 class="repo-name"><a href="#" target="_blank" rel="noopener"></a></h3>
    <p class="repo-desc"></p>
    <div class="repo-meta">
      <span class="meta-item stars">★ <b></b></span>
      <span class="meta-item forks">⑂ <b></b></span>
      <span class="meta-item lang"></span>
      <span class="meta-item license"></span>
      <span class="meta-item updated"></span>
    </div>
    <div class="repo-topics"></div>
    <div class="card-actions">
      <button class="card-action-btn copy-clone-btn">Copy Clone</button>
      <button class="card-action-btn copy-url-btn">Copy URL</button>
    </div>
  </article>
</template>

<script src="app.js"></script>
</body>
</html>
